<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VWFS Knowledge Hub - POC</title>
  <script src="https://alcdn.msauth.net/browser/2.37.1/js/msal-browser.min.js"></script>

  <style>
    :root {
      --bg-main: #0B0F19;
      --bg-panel: #111827;
      --border-color: #1F2937;
      --text-main: #F3F4F6;
      --text-muted: #9CA3AF;
      --accent-blue: #2563EB;
      --accent-hover: #1D4ED8;
      --ai-bubble: #1F2937;
      --user-bubble: #2563EB;
      font-family: 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background-color: var(--bg-main); 
      color: var(--text-main); 
      height: 100vh; 
      overflow: hidden; 
      display: flex;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4B5563; }

    /* LAYOUT */
    .app-container { display: flex; width: 100%; height: 100%; }
    
    .sidebar { 
      width: 280px; 
      background-color: var(--bg-panel); 
      border-right: 1px solid var(--border-color); 
      display: flex; 
      flex-direction: column; 
      padding: 20px; 
    }
    
    .main-chat { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }
    
    .right-panel { 
      width: 300px; 
      background-color: var(--bg-panel); 
      border-left: 1px solid var(--border-color); 
      padding: 20px; 
    }

    /* SIDEBAR ELEMENTS */
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
    .logo { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-blue), #1e3a8a); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 16px; letter-spacing: 1px; }
    .brand h1 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .brand span { font-size: 12px; color: var(--text-muted); }

    .user-profile { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #374151; display: flex; justify-content: center; align-items: center; font-weight: 600; font-size: 14px; }
    .user-profile strong { font-size: 14px; font-weight: 500; }

    .btn-primary { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { width: 100%; background: transparent; color: var(--text-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 10px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); }

    .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin: 30px 0 10px 0; letter-spacing: 0.5px; }
    .chat-item { width: 100%; text-align: left; background: rgba(37, 99, 235, 0.1); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }

    /* CHAT HEADER */
    .chat-header { height: 70px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 30px; background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(10px); z-index: 10; }
    .chat-header h2 { font-size: 16px; font-weight: 500; }

    /* CHAT MESSAGES AREA */
    .chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
    
    .message-row { display: flex; width: 100%; animation: fadeIn 0.3s ease; }
    .message-row.ai { justify-content: flex-start; }
    .message-row.user { justify-content: flex-end; }

    .message-content { display: flex; gap: 16px; max-width: 80%; }
    .message-row.user .message-content { flex-direction: row-reverse; }

    .bubble { padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
    
    .message-row.ai .bubble { background: var(--ai-bubble); border: 1px solid #374151; color: #F9FAFB; border-top-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .message-row.user .bubble { background: var(--user-bubble); color: #FFFFFF; border-top-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
    
    .message-row.ai .avatar { background: #374151; color: white; flex-shrink: 0; }
    .message-row.user .avatar { background: var(--accent-blue); color: white; flex-shrink: 0; }

    .bubble pre { background: #111827; padding: 10px; border-radius: 8px; overflow-x: auto; margin-top: 10px; font-family: monospace; font-size: 13px; }
    
    /* COMPOSER */
    .composer-area { padding: 20px 30px 30px 30px; background: var(--bg-main); border-top: 1px solid var(--border-color); }
    .input-box { display: flex; gap: 12px; background: var(--bg-panel); border: 1px solid #374151; padding: 10px 10px 10px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.2s; }
    .input-box:focus-within { border-color: var(--accent-blue); }
    
    textarea { flex: 1; background: transparent; border: none; color: white; font-family: inherit; font-size: 15px; resize: none; outline: none; padding: 10px 0; height: 44px; line-height: 24px; }
    textarea::placeholder { color: #6B7280; }
    textarea:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-blue); color: white; border: none; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.05); }
    .send-btn:disabled { background: #374151; color: #9CA3AF; cursor: not-allowed; transform: none; }

    /* RIGHT PANEL */
    .right-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text-main); }
    .doc-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 14px; border-radius: 12px; transition: 0.2s; }
    .doc-card:hover { border-color: #4B5563; }
    .doc-card strong { display: block; font-size: 14px; color: var(--accent-blue); margin-bottom: 4px; }
    .doc-card small { font-size: 12px; color: var(--text-muted); }

    /* TYPING INDICATOR */
    .typing { display: flex; gap: 5px; padding: 5px 0; }
    .typing span { width: 6px; height: 6px; background: #9CA3AF; border-radius: 50%; animation: blink 1.4s infinite both; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }
  </style>
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">VW</div>
        <div>
          <h1>Knowledge Hub</h1>
          <span>VWFS AI Assistant</span>
        </div>
      </div>
      
      <div class="user-profile">
        <div class="avatar" id="uiAv">?</div>
        <strong id="uiName">Nepřihlášen</strong>
      </div>
      
      <button class="btn-primary" id="loginBtn" onclick="loginUser()">Přihlásit se (SSO)</button>
      <button class="btn-secondary" onclick="clearChat()" id="clearBtn" style="display:none;">Vyčistit konverzaci</button>
      
      <div class="section-title">Aktivní POC</div>
      <button class="chat-item">Škoda Octavia (POC)</button>
    </aside>

    <main class="main-chat">
      <div class="chat-header">
        <h2>Škoda Octavia - IT POC Analýza</h2>
      </div>
      
      <div class="chat-messages" id="chatWindow"></div>
      
      <div class="composer-area">
        <div class="input-box">
          <textarea id="prompt" placeholder="Pro zahájení analýzy se nejprve přihlaste..." disabled onkeydown="handleEnter(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </main>

    <aside class="right-panel">
      <h3>Indexované zdroje dat</h3>
      <div class="doc-card">
        <strong>Octavia_IV.pdf</strong>
        <small>Business Analysis & Technical Specs</small>
      </div>
    </aside>
  </div>

  <script>
    const msalConfig = {
      auth: {
        clientId: "41e3c8da-a8a6-4184-b7d9-9e87ad92ff83",
        authority: "https://login.microsoftonline.com/8659bccf-b2fe-4d28-b5be-04910dc7d193",
        redirectUri: window.location.origin
      },
      cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
    };
    
    const tokenRequest = { scopes: ["https://ai.azure.com/.default"] };
    const msalInstance = new msal.PublicClientApplication(msalConfig);
    let activeAccount = null;

    msalInstance.initialize().then(() => {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) updateUI(accounts[0]);
    }).catch(console.error);

    async function loginUser() {
      try {
        const res = await msalInstance.loginPopup(tokenRequest);
        updateUI(res.account);
      } catch (e) { console.error("Login Error:", e); }
    }

    async function getAccessToken() {
        if (!activeAccount) throw new Error("Uživatel není přihlášen");
        const request = { ...tokenRequest, account: activeAccount };
        try {
            return (await msalInstance.acquireTokenSilent(request)).accessToken;
        } catch (error) {
            if (error instanceof msal.InteractionRequiredAuthError) {
                return (await msalInstance.acquireTokenPopup(request)).accessToken;
            }
            throw error;
        }
    }

    function appendMessage(role, text, id = null) {
        const chatWindow = document.getElementById("chatWindow");
        const isUser = role === 'user';
        const avatar = isUser ? activeAccount.name.substring(0,2).toUpperCase() : "AI";
        
        // OPRAVA JS PÁDU: Vždy vynutíme string, aby nevyhodil TypeError
        const safeText = String(text);

        let contentHtml = safeText;
        if (safeText === "TYPING") {
            contentHtml = `<div class="typing"><span></span><span></span><span></span></div>`;
        } else {
            // Bezpečné formátování textu
            contentHtml = safeText.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
        }

        const msgHtml = `
          <div class="message-row ${isUser ? 'user' : 'ai'}" ${id ? `id="${id}"` : ''}>
            <div class="message-content">
              <div class="avatar">${avatar}</div>
              <div class="bubble">${contentHtml}</div>
            </div>
          </div>
        `;
        
        chatWindow.insertAdjacentHTML("beforeend", msgHtml);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
      const promptEl = document.getElementById("prompt");
      const sendBtn = document.getElementById("sendBtn");
      const msg = promptEl.value.trim();
      
      if (!msg || !activeAccount) return;

      promptEl.disabled = true;
      sendBtn.disabled = true;
      promptEl.value = "";

      appendMessage("user", msg);
      
      const typingId = "typing-" + Date.now();
      appendMessage("ai", "TYPING", typingId);

      try {
        const token = await getAccessToken();

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { 
              "Content-Type": "application/json", 
              "X-Custom-Auth": `Bearer ${token}` 
          },
          body: JSON.stringify({ messages: [{ role: "user", content: msg }] })
        });

        const data = await res.json();
        const reply = data.response || "Odpověď se nepodařilo dekódovat z backendu.";
        
        document.getElementById(typingId).remove();
        appendMessage("ai", reply);

      } catch (error) {
        document.getElementById(typingId).remove();
        appendMessage("ai", `Kritická chyba: ${error.message}`);
      } finally {
        promptEl.disabled = false;
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    function updateUI(account) {
        activeAccount = account;
        document.getElementById("uiName").innerText = account.name;
        document.getElementById("uiAv").innerText = account.name.substring(0,2).toUpperCase();
        
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("clearBtn").style.display = "block";
        
        const promptEl = document.getElementById("prompt");
        promptEl.disabled = false;
        promptEl.placeholder = "Zadejte dotaz pro AI analytika...";
        document.getElementById("sendBtn").disabled = false;
    }

    function handleEnter(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function renderWelcome() { 
        document.getElementById("chatWindow").innerHTML = "";
        appendMessage("ai", "Vítejte v analytickém rozhraní pro projekt Škoda Octavia. Prosím, přihlaste se v levém panelu pomocí SSO pro odemčení přístupu k firemním datům.");
    }

    function clearChat() { renderWelcome(); }

    renderWelcome();
  </script>
</body>
</html>
