<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VWFS Knowledge Hub - POC</title>
  <script src="https://alcdn.msauth.net/browser/2.37.1/js/msal-browser.min.js"></script>

  <style>
    :root {
      --bg: #070b1a; --panel: #0d1328; --panel-2: #111a35; --panel-3: #162142;
      --text: #e8edff; --muted: #8490b8; --border: #22305c; --accent: #3b82f6;
      --accent-2: #60a5fa; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
      --chip: #1a2550; --chip-text: #b8c4ff; --locked: #64748b;
      --shadow: 0 24px 70px rgba(0, 0, 0, .35); --radius: 18px;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: radial-gradient(circle at top left, rgba(59, 130, 246, .17), transparent 35%), var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .app { display: grid; grid-template-columns: 310px 1fr 340px; height: 100vh; }
    /* SIDEBAR */
    .sidebar { background: rgba(9, 14, 31, .95); border-right: 1px solid var(--border); padding: 18px; display: flex; flex-direction: column; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 12px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .logo { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #1e3a8a); display: grid; place-items: center; font-weight: 800; }
    .user-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .user-top { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: #22305c; display: grid; place-items: center; font-weight: 700; }
    .new-chat { border: 0; background: linear-gradient(135deg, var(--accent), #1d4ed8); color: white; padding: 13px 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
    .section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; margin: 8px 2px; }
    .chat-list { display: flex; flex-direction: column; gap: 8px; }
    .chat-item { background: transparent; border: 1px solid transparent; color: var(--text); padding: 12px; border-radius: 14px; cursor: pointer; text-align: left; transition: .15s; }
    .chat-item.active { background: var(--panel-2); border-color: var(--accent); }
    .chat-item.locked { opacity: 0.6; cursor: not-allowed; }
    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar { height: 72px; border-bottom: 1px solid var(--border); background: rgba(9, 14, 31, .75); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .chat-window { flex: 1; overflow: auto; padding: 28px; }
    .message { display: grid; grid-template-columns: 42px 1fr; gap: 14px; margin-bottom: 24px; max-width: 980px; }
    .message.user { margin-left: auto; }
    .message.user .bubble { background: linear-gradient(135deg, #1e3a8a, #1d4ed8); border-color: #3157c7; }
    .message.ai .avatar { background: linear-gradient(135deg, #334155, #172033); }
    .bubble { background: rgba(13, 19, 40, .95); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
    .loading-pulse { animation: pulse 1.5s infinite; color: var(--accent-2); font-style: italic; }
    @keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }
    .composer { border-top: 1px solid var(--border); padding: 18px 24px; background: rgba(9, 14, 31, .9); }
    .composer-box { display: grid; grid-template-columns: 1fr auto; gap: 12px; max-width: 1050px; margin: 0 auto; }
    textarea { resize: none; height: 58px; border-radius: 16px; border: 1px solid var(--border); background: var(--panel); color: var(--text); padding: 15px 16px; width: 100%; outline: none; }
    .send { width: 58px; border: 0; border-radius: 16px; background: var(--accent); color: white; cursor: pointer; }
    .toast { position: fixed; bottom: 22px; right: 22px; background: #111827; color: white; border: 1px solid var(--border); padding: 13px 16px; border-radius: 14px; opacity: 0; transition: .18s; z-index: 1000; }
    .toast.show { opacity: 1; }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">VW</div><div><h1>Knowledge Hub</h1><span>VWFS AI Assistant</span></div></div>
      <div class="user-card">
        <div class="user-top"><div class="avatar" id="uiAv">?</div><div><strong id="uiName">Nepřihlášen</strong></div></div>
      </div>
      <button class="new-chat" id="loginBtn" onclick="loginUser()">+ Přihlásit se (SSO)</button>
      <button class="new-chat" onclick="clearChat()" id="clearBtn" style="display:none;">+ Vyčistit chat</button>
      <div><div class="section-title">Aktivní POC</div><div class="chat-list"><button class="chat-item active"><div class="chat-item-title"><span>Škoda Octavia (POC)</span></div></button></div></div>
    </aside>

    <main class="main">
      <header class="topbar"><h2>Škoda Octavia - IT POC Analýza</h2></header>
      <section class="chat-window" id="chatWindow"></section>
      <footer class="composer">
        <div class="composer-box"><textarea id="prompt" placeholder="Nejprve se přihlas..."></textarea><button class="send" onclick="sendMessage()">➜</button></div>
      </footer>
    </main>

    <aside class="right-panel">
      <div class="panel-card"><h3>Indexované zdroje</h3><div class="doc"><div><strong>Octavia_IV.pdf</strong><small>business analysis</small></div></div></div>
    </aside>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: "41e3c8da-a8a6-4184-b7d9-9e87ad92ff83",
        authority: "https://login.microsoftonline.com/8659bccf-b2fe-4d28-b5be-04910dc7d193",
        redirectUri: window.location.origin
      }
    });

    let activeAccount = null;

    msalInstance.initialize().then(() => {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) updateUI(accounts[0]);
    });

    async function loginUser() {
      try {
        const res = await msalInstance.loginPopup({ scopes: ["https://vwfs-poc.services.ai.azure.com/.default"] });
        updateUI(res.account);
        toast("Přihlášeno!");
      } catch (e) { toast("Chyba: " + e.message); }
    }

    function updateUI(account) {
        activeAccount = account;
        document.getElementById("uiName").innerText = account.name;
        document.getElementById("uiAv").innerText = account.name.substring(0,2).toUpperCase();
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("clearBtn").style.display = "block";
    }

    async function sendMessage() {
      const prompt = document.getElementById("prompt");
      const msg = prompt.value.trim();
      if (!msg || !activeAccount) return toast("Nejsi přihlášen!");

      const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["https://ai.azure.com/.default"], account: activeAccount });
      
      const chatWindow = document.getElementById("chatWindow");
      chatWindow.insertAdjacentHTML("beforeend", `<div class="message user"><div class="bubble"><p>${escapeHtml(msg)}</p></div></div>`);
      prompt.value = "";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${tokenRes.accessToken}` },
        body: JSON.stringify({ messages: [{ role: "user", content: msg }] })
      });

      const data = await res.json();
      const reply = data.response || data.choices?.[0]?.message?.content || "Chyba backendu.";
      chatWindow.insertAdjacentHTML("beforeend", `<div class="message ai"><div class="bubble"><p>${reply.replace(/\n/g, '<br>')}</p></div></div>`);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function renderWelcome() { document.getElementById("chatWindow").innerHTML = `<div class="message ai"><div class="bubble"><p>Vítej v POC pro Octavia. Přihlas se SSO vlevo.</p></div></div>`; }
    function clearChat() { renderWelcome(); toast("Chat vyčištěn"); }
    function toast(t) { const el = document.getElementById("toast"); el.textContent = t; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2000); }
    function escapeHtml(text) { const div = document.createElement("div"); div.textContent = text; return div.innerHTML; }
    renderWelcome();
  </script>
</body>
</html>
